decomposition-pipeline {
  # FS2 concurrency over inbound bill.text.ingested events
  parallelism = 4
  # bounded parEvalMap width for the per-concept Haiku call (the LLM hot path)
  simplification-parallelism = 8
  # safety cap on per-bill section fan-out
  max-sections-per-bill = 500
  # snapshot the run writes under; idempotency key = (versionId, decompositionSnapshotVersion)
  decomposition-snapshot-version = "v1"

  ollama {
    base-uri = "http://localhost:11434"
    embedding-model = "qwen3-embedding:0.6b"
    embed-parallelism = 8
  }

  claude {
    # production summarizer = Haiku (validated to hold DP-7 retrieval; Sonnet was gold-building only)
    model = "claude-haiku-4-5"
    max-tokens = 2048
  }

  database {
    host = "localhost"
    port = 5432
    database = "repcheck"
    user = "repcheck"
    password = "repcheck"
  }

  pubsub {
    project-id = "repcheck-dev"
    subscription-id = "bill-text-ingested-decomposition-sub"
    completed-topic-id = "bill-decomposition-completed"
  }
}
