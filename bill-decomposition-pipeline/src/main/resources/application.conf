# Bill Decomposition Pipeline configuration (Component 10.4).
#
# How config reaches the container: this file ships in the jar with LOCAL-DEV defaults, and every
# environment-specific value has a `${?ENV_VAR}` override line. PureConfig's ConfigSource.default
# loads it from the classpath; the Cloud Run Job's environment supplies the real values per env
# (dev/staging/prod), with secrets (DB_PASSWORD) sourced from Secret Manager and surfaced as env.
# This mirrors the sibling ingestion pipelines (bill-text-pipeline et al.) exactly — there is no
# per-env config baked into the image, and the defaults below only serve local `docker-compose` runs.

# FS2 concurrency over inbound bill.text.ingested events (one bill decomposed per stream element)
parallelism = 4
parallelism = ${?DECOMPOSITION_PARALLELISM}

# bounded parEvalMap width for the per-concept Haiku summarize+stance call (the LLM hot path)
simplification-parallelism = 8
simplification-parallelism = ${?DECOMPOSITION_SIMPLIFICATION_PARALLELISM}

# safety cap on per-bill section fan-out
max-sections-per-bill = 500
max-sections-per-bill = ${?DECOMPOSITION_MAX_SECTIONS_PER_BILL}

ollama {
  base-uri = "http://localhost:11434"
  base-uri = ${?OLLAMA_BASE_URL}
  embedding-model = "qwen3-embedding:0.6b"
  embedding-model = ${?OLLAMA_MODEL_NAME}
  embed-parallelism = 8
  embed-parallelism = ${?OLLAMA_EMBED_PARALLELISM}
}

claude {
  # production summarizer = Haiku (validated to hold DP-7 retrieval; Sonnet was gold-building only)
  model = "claude-haiku-4-5"
  model = ${?CLAUDE_MODEL}
  # sized for the 6-field per-concept stance schema (DP-7 found 2048 truncated the structured output)
  max-tokens = 8192
  max-tokens = ${?CLAUDE_MAX_TOKENS}
}

database {
  host = "localhost"
  host = ${?DB_HOST}
  port = 5432
  port = ${?DB_PORT}
  database = "repcheck"
  database = ${?DB_NAME}
  user = "repcheck"
  user = ${?DB_USERNAME}
  password = "repcheck"
  password = ${?DB_PASSWORD}
}

pubsub {
  project-id = "repcheck-dev"
  project-id = ${?GCP_PROJECT_ID}
  subscription-id = "bill-text-ingested-decomposition-sub"
  subscription-id = ${?EVENT_SUBSCRIBER_SUBSCRIPTION}
  completed-topic-id = "bill-decomposition-completed"
  completed-topic-id = ${?EVENT_PUBLISHER_TOPIC}
}
